- name: enable CentOS 7 Stream Vault repo
  shell: |
    sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-*
    sed -i 's/#baseurl/baseurl/g' /etc/yum.repos.d/CentOS-*
    sed -i 's/mirror.centos.org/vault.centos.org/g' /etc/yum.repos.d/CentOS-*
  become: true

- name: "Add cloud rpm repository {{ yunion_yum_repo }}"
  copy:
    content: |
      [yunion-repo-offline]
      name=Packages for Yunion Multi-Cloud Platform -
      baseurl=https://iso.yunion.cn/centos/$releasever/3.11/$basearch
      sslverify=0
      failovermethod=priority
      enabled=1
      gpgcheck=0
      priority=3
      module_hotfixes=true

      [yunion-repo-base]
      name=Packages for Yunion Cloud Platform
      baseurl=https://iso.yunion.cn/rpm/8/{{ ansible_architecture }}
      sslverify=0
      failovermethod=priority
      enabled=1
      gpgcheck=0
      priority=1
      module_hotfixes=true

      [yunion-repo-updates]
      name=Updated Packages for Yunion Cloud Platform
      baseurl=https://iso.yunion.cn/rpm-updates/{{ansible_architecture}}
      sslverify=0
      failovermethod=priority
      enabled=1
      gpgcheck=0
      priority=2
      module_hotfixes=true
    dest: /etc/yum.repos.d/yunion.repo
  become: yes
  retries: 3
  delay: 30
  when:
  - offline_data_path is not defined or offline_data_path | length == 0

- name: Include RedHat Family Common Tasks
  include_tasks: redhat.yml

- name: install misc obsolete packages
  package:
    name: "{{ package_item }}"
    disablerepo: "{{ (online_status != 'online') | ternary('*', omit) }}"
    enablerepo: "{{ (online_status != 'online') | ternary('yunion-*', omit) }}"
  become: yes
  loop_control:
    index_var: item_index
    loop_var: package_item
  with_items:
  - yunion-qemu-2.12.1
  when:
  - is_centos_x86 is defined
  tags:
  - package
  register: obsolete_packages
  until: obsolete_packages.rc == 0
  retries: 3
  delay: 30


